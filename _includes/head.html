<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  {% assign desc = page.excerpt | default: site.tagline %}
  <meta name="description" content="{{ desc }}">
  <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url }}">

  <!-- Open Graph -->
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
  <meta property="og:type" content="{% if page.layout == 'project' %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ desc }}">
  <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/thumbnail.png">
  <meta property="og:site_name" content="Arush Sharma">

  <!-- Twitter/X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }}">
  <meta name="twitter:description" content="{{ desc }}">
  <meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/thumbnail.png">

  <!-- Theme & Icons -->
  <meta name="theme-color" content="#0055ff">
  <link rel="icon" type="image/png" href="{{ site.baseurl }}/favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ site.baseurl }}/css/style.css">

  <!-- JSON-LD Structured Data -->
  {% if page.layout == 'home' or page.url == '/' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Arush Sharma",
    "jobTitle": "Sr. Product Manager - Platform",
    "worksFor": {
      "@type": "Organization",
      "name": "PointClickCare"
    },
    "url": "{{ site.url }}",
    "sameAs": [
      "https://www.linkedin.com/in/{{ site.linkedin }}",
      "https://www.github.com/{{ site.github }}",
      "https://{{ site.medium }}.medium.com"
    ],
    "knowsAbout": ["Product Management", "Identity & Access Management", "AI Agents", "Healthcare Technology", "Platform Engineering"],
    "alumniOf": [
      { "@type": "EducationalOrganization", "name": "MDI Gurgaon" },
      { "@type": "EducationalOrganization", "name": "Chitkara University" }
    ]
  }
  </script>
  {% endif %}

  <!-- Analytics -->
  {% if site.google_analytics %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>
  {% endif %}
</head>
