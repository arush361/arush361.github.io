<!DOCTYPE html>
<html lang="en">
{% include head.html %}
<body>
  <canvas id="constellation" aria-hidden="true"></canvas>
  <div id="floating-glyphs" aria-hidden="true"></div>
  <a href="{{ site.baseurl }}/v1/" class="version-toggle">&#9654; Classic</a>
  <div class="paper">
    {% include header.html %}
    <main>
      {{ content }}
    </main>
    {% include footer.html %}
  </div>
  <div class="avatar-lightbox" id="avatar-lightbox">
    <div class="avatar-lightbox__backdrop"></div>
    <img src="{{ site.baseurl }}/img/headshot.png" alt="Arush Sharma" class="avatar-lightbox__img">
    <span class="avatar-lightbox__name">Arush Sharma</span>
    <span class="avatar-lightbox__hint">click anywhere to close</span>
  </div>
  <button class="back-to-top" id="back-to-top" aria-label="Back to top">&#8593;</button>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">&#9790;</button>
  <script src="{{ site.baseurl }}/js/app.js" defer></script>
</body>
</html>
